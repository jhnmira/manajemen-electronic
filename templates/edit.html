<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Produk</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --surface2: #1a1a24;
        --border: #2a2a3a;
        --accent: #7c6af7;
        --accent2: #e84393;
        --accent3: #00d4aa;
        --text: #f0eeff;
        --muted: #8888aa;
        --danger: #ff4d6d;
        --radius: 14px;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        top: -200px;
        left: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(124, 106, 247, 0.1) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(10, 10, 15, 0.85);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--border);
        padding: 0 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 68px;
      }
      .logo {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 1.3rem;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      .back-link {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 500;
        border: 1px solid var(--border);
        padding: 7px 16px;
        border-radius: 8px;
        background: var(--surface2);
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .back-link:hover {
        color: var(--text);
        border-color: var(--accent);
      }

      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 60px 24px;
        position: relative;
        z-index: 1;
      }

      .edit-eyebrow {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 10px;
      }
      .edit-title {
        font-family: "Syne", sans-serif;
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
      }
      .edit-sub {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 36px;
      }

      .form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 32px;
        position: relative;
        overflow: hidden;
      }
      .form-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          var(--accent),
          var(--accent2),
          var(--accent3)
        );
      }

      .field {
        margin-bottom: 20px;
      }
      .field label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .field input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 12px 16px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.97rem;
        color: var(--text);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124, 106, 247, 0.15);
      }

      .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 10px;
      }
      .btn-save {
        flex: 1;
        padding: 14px;
        border: none;
        border-radius: 9px;
        background: linear-gradient(135deg, var(--accent), #5b4de0);
        color: #fff;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .btn-save:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-cancel {
        padding: 14px 22px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: transparent;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 0.92rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .btn-cancel:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      .field-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      main {
        animation: fadeUp 0.45s ease both;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">⬡ ProdukApp</div>
      <a href="/" class="back-link">← Kembali</a>
    </header>

    <main>
      <div class="edit-eyebrow">Edit Produk</div>
      <h1 class="edit-title">Ubah Detail Produk</h1>
      <p class="edit-sub">
        Perbarui informasi produk di bawah ini, lalu simpan perubahan.
      </p>

      <div class="form-card">
        <form action="/update/{{ data[0] }}" method="POST">
          <div class="field">
            <label>Nama Produk</label>
            <input
              type="text"
              name="nama_produk"
              value="{{ data[1] }}"
              required
            />
          </div>
          <div class="field">
            <label>Kategori</label>
            <input type="text" name="kategori" value="{{ data[2] }}" required />
          </div>
          <div class="field-grid">
            <div class="field">
              <label>Harga (Rp)</label>
              <input
                type="number"
                name="harga"
                value="{{ data[3] }}"
                min="0"
                required
              />
            </div>
            <div class="field">
              <label>Stok</label>
              <input
                type="number"
                name="stok"
                value="{{ data[4] }}"
                min="0"
                required
              />
            </div>
          </div>
          <div class="btn-row">
            <button type="submit" class="btn-save">Simpan Perubahan</button>
            <a href="/" class="btn-cancel">Batal</a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
